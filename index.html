<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação Laila</title>
    
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f0f4f8; /* Cor de fundo suave */
            overflow: hidden; /* Evita rolagem no celular */
        }

        /* Telas (Parte 1 e Parte 2) */
        .tela {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ocultar elementos inicialmente */
        #parte2, #icones {
            display: none;
        }

        /* POSIÇÃO DA LAILA
         Agora ela fica centralizada, apenas um pouco mais para baixo, 
         fugindo dos cantos apertados.
        */
        .laila {
            width: 150px;
            height: 150px;
            background-color: #ffb7b2; /* Cor temporária caso não tenha a imagem */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            
            /* Ajuste de posição (mais perto do centro) */
            margin-bottom: 30px; 
            
            /* Se for usar uma imagem real da Laila, descomente a linha abaixo e coloque o link */
            /* background-image: url('sua-imagem-laila.png'); background-size: cover; */
        }

        /* Efeito ao tocar/clicar na Laila */
        .laila:active {
            transform: scale(0.95);
        }

        /* Título de instrução */
        h1 {
            color: #333;
            font-size: 1.5rem;
            text-align: center;
            padding: 0 20px;
            margin-bottom: 40px;
        }

        /* Container dos Ícones */
        .icones-container {
            display: flex;
            gap: 20px; /* Espaço entre os ícones */
            margin-top: 20px;
        }

        /* Estilo visual dos Ícones (TV, Fotos, Gráficos) */
        .icone {
            font-size: 3rem; /* Tamanho do ícone */
            background: white;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de hover/clique nos ícones */
        .icone:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }
        .icone:active {
            transform: scale(0.9);
        }

        /* Ajustes finos para celulares pequenos */
        @media (max-width: 400px) {
            .laila {
                width: 120px;
                height: 120px;
            }
            .icone {
                font-size: 2.5rem;
                padding: 15px;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <audio id="som-clique" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

    <div id="parte1" class="tela">
        <h1>Olá! Clique na Laila para iniciar.</h1>
        <div class="laila" onclick="irParaParte2()">Laila</div>
    </div>

    <div id="parte2" class="tela">
        <h1 id="texto-instrucao">Toque na Laila para ver as opções!</h1>
        
        <div class="laila" onclick="clicarNaLaila()">Laila</div>

        <div id="icones" class="icones-container">
            <div class="icone" onclick="acaoIcone('Televisão')">📺</div>
            <div class="icone" onclick="acaoIcone('Álbum de Fotos')">🖼️</div>
            <div class="icone" onclick="acaoIcone('Gráficos')">📊</div>
        </div>
    </div>

    <script>
        // Função para sair da Parte 1 e ir para a Parte 2
        function irParaParte2() {
            document.getElementById('parte1').style.display = 'none';
            // Usa 'flex' no lugar de 'block' para manter a centralização
            document.getElementById('parte2').style.display = 'flex'; 
        }

        // Função ativada ao clicar na Laila na Parte 2
        function clicarNaLaila() {
            // 1. Toca o som
            let som = document.getElementById('som-clique');
            // 'currentTime = 0' garante que o som reinicie se clicado rápido
            som.currentTime = 0; 
            som.play();

            // 2. Faz os ícones surgirem
            document.getElementById('icones').style.display = 'flex';
            
            // (Opcional) Muda o texto de instrução
            document.getElementById('texto-instrucao').innerText = "Escolha um dos ícones abaixo:";
        }

        // Função para quando o usuário clicar em um ícone
        function acaoIcone(nomeDoIcone) {
            alert("Você abriu: " + nomeDoIcone + "!");
            // Aqui você pode colocar o código para abrir as outras páginas ou imagens.
        }
    </script>

</body>
</html>
