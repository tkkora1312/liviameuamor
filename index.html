<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia dos Namorados!</title>
    <style>
        body {
            background-color: #ffcccc; /* Fundo vermelho claro */
            margin: 0;
            overflow: hidden;
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Telinha de Início para liberar o Áudio */
        #tela-inicio {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffcccc; z-index: 100;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        #btn-comecar {
            padding: 15px 30px; font-size: 20px; font-weight: bold; background-color: #d32f2f;
            color: white; border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s;
        }
        #btn-comecar:hover { transform: scale(1.1); }

        /* Pepperonis Formato Coração no Fundo */
        #background-coracoes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }
        .heart-wrapper {
            position: absolute; bottom: -50px;
            animation: floatUp linear infinite;
        }
        .pepperoni-heart {
            position: relative; width: 30px; height: 30px;
            background-color: #c13b2b; transform: rotate(-45deg);
            opacity: 0.3; /* Opacidade menor */
            background-image: radial-gradient(circle at 10px 10px, #8a251c 3px, transparent 3px),
                              radial-gradient(circle at 20px 20px, #8a251c 2px, transparent 2px);
        }
        .pepperoni-heart::before, .pepperoni-heart::after {
            content: ""; position: absolute; width: 30px; height: 30px;
            background-color: #c13b2b; border-radius: 50%;
            background-image: radial-gradient(circle at 15px 5px, #8a251c 2px, transparent 2px);
        }
        .pepperoni-heart::before { top: -15px; left: 0; }
        .pepperoni-heart::after { top: 0; left: 15px; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(30deg); }
        }

        /* Efeito de Tremida na Tela */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, 5px); }    
            20%, 40%, 60%, 80% { transform: translate(5px, -5px); }
        }
        .tremendo {
            animation: shake 0.4s ease-in-out;
        }

        /* Textos Melhorados */
        #texto-container {
            font-size: 30px;
            color: #4a0000;
            text-align: center;
            z-index: 10;
            position: relative;
            max-width: 90%;
            line-height: 1.6;
            font-weight: bold;
        }
        .palavra-grande {
            font-size: 100px;
            color: #d32f2f;
            font-weight: 900;
            display: inline-block;
            opacity: 0; /* Escondido no começo */
            text-transform: uppercase;
            margin: 0 10px;
            text-shadow: 3px 3px 0px #fff, 5px 5px 15px rgba(0,0,0,0.4);
            transform: translateY(-100vh); /* Fica lá no céu */
        }
        .caindo-do-ceu {
            animation: dropDown 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }
        @keyframes dropDown {
            0% { opacity: 1; transform: translateY(-100vh); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Personagem Jacaré Laila */
        #jacare-container {
            position: absolute; left: -300px; bottom: 20%;
            display: none; flex-direction: column; align-items: center; z-index: 20;
        }
        
        /* Estrelinhas girando (Atordoada) */
        #estrelas {
            display: none; font-size: 35px;
            animation: girar 1s linear infinite; margin-bottom: -10px;
        }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Caixa de fala */
        .balao-fala {
            display: none; background: white; padding: 15px; border-radius: 15px;
            border: 2px solid #333; margin-bottom: 15px; max-width: 250px;
            text-align: center; font-weight: bold; box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        /* Cena 2: Caixa de Madeira */
        #cena-caixa {
            display: none; flex-direction: column; align-items: center; z-index: 30;
        }
        .caixa-madeira {
            width: 200px; height: 200px; background-color: #8b5a2b;
            border: 5px solid #5c3a21; position: relative; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .caixa-madeira:hover { transform: scale(1.05); }
        .caixa-madeira::before { content: ""; position: absolute; left: 45%; top: 0; width: 10%; height: 100%; background: #ff4081; }
        .caixa-madeira::after { content: ""; position: absolute; top: 45%; left: 0; height: 10%; width: 100%; background: #ff4081; }

        /* Animações Laila */
        .correndo { animation: correr 1.5s forwards; }
        @keyframes correr {
            0% { left: -300px; }
            100% { left: 40%; }
        }
        .caindo { transform: rotate(-90deg); transition: transform 0.3s ease-in; }
        .levantando { transform: rotate(0deg); transition: transform 0.5s ease-out; }

    </style>
</head>
<body>

    <div id="tela-inicio">
        <h2 style="color: #d32f2f;">Você tem um presente...</h2>
        <button id="btn-comecar" onclick="comecarTudo()">Abrir Presente</button>
    </div>

    <audio id="audio-correndo" src="passos.mp3"></audio>

    <div id="background-coracoes"></div>

    <div id="texto-container">
        <span id="texto-parte1"></span>
        <span id="palavra-alvo" class="palavra-grande">grande</span>
        <span id="texto-parte2"></span>
    </div>

    <div id="jacare-container">
        <div id="balao-jacare" class="balao-fala">[SUA FRASE AQUI]</div>
        <div id="estrelas">💫✨💫</div>
        <img id="laila-img" src="laila.png" style="width: 150px; z-index: 25;" alt="Jacaré Laila">
        <div style="background: pink; color: white; padding: 2px 10px; border-radius: 10px; font-size: 14px; margin-top: -10px; font-weight: bold; z-index: 26;">Laila</div>
    </div>

    <div id="cena-caixa">
        <div id="balao-caixa" class="balao-fala">[SUA SEGUNDA FRASE AQUI]</div>
        <div class="caixa-madeira" onclick="abrirCaixa()"></div>
    </div>

    <script>
        // Gera os corações aleatórios pelo fundo
        const containerCoracoes = document.getElementById('background-coracoes');
        for (let i = 0; i < 25; i++) {
            let wrapper = document.createElement('div');
            wrapper.className = 'heart-wrapper';
            wrapper.style.left = Math.random() * 100 + 'vw';
            wrapper.style.animationDuration = (5 + Math.random() * 6) + 's';
            wrapper.style.animationDelay = (Math.random() * 5) + 's';
            
            let heart = document.createElement('div');
            heart.className = 'pepperoni-heart';
            
            wrapper.appendChild(heart);
            containerCoracoes.appendChild(wrapper);
        }

        // Configuração dos Textos
        const parte1 = "Feliz dia dos namorados e Feliz 6 meses de namoro meu ";
        const parte2 = " amoooor!";
        
        function typeWriter(texto, elementoId, velocidade, callback) {
            let index = 0;
            const elemento = document.getElementById(elementoId);
            function digitar() {
                if (index < texto.length) {
                    elemento.innerHTML += texto.charAt(index);
                    index++;
                    setTimeout(digitar, velocidade);
                } else if (callback) {
                    callback();
                }
            }
            digitar();
        }

        // Função chamada no botão inicial
        function comecarTudo() {
            document.getElementById('tela-inicio').style.display = 'none';
            
            // Inicia digitação da parte 1 (bem rapidinho: 40ms)
            typeWriter(parte1, 'texto-parte1', 40, () => {
                
                // Faz a palavra GRANDE cair
                const palavraGrande = document.getElementById('palavra-alvo');
                palavraGrande.classList.add('caindo-do-ceu');
                
                // Espera ela terminar de cair (0.5s) para tremer a tela
                setTimeout(() => {
                    document.body.classList.add('tremendo');
                    
                    // Terminou de tremer, digita o resto
                    setTimeout(() => {
                        document.body.classList.remove('tremendo');
                        typeWriter(parte2, 'texto-parte2', 40, () => {
                            
                            // Chama a Laila 1 segundo após terminar de escrever tudo
                            setTimeout(iniciarCenaJacare, 1000);
                            
                        });
                    }, 400); // tempo do shake
                    
                }, 500); // tempo de queda
            });
        }

        function iniciarCenaJacare() {
            const jacare = document.getElementById('jacare-container');
            const audio = document.getElementById('audio-correndo');
            const estrelas = document.getElementById('estrelas');
            const lailaImg = document.getElementById('laila-img');
            const balao = document.getElementById('balao-jacare');

            audio.play();
            jacare.style.display = 'flex';
            jacare.classList.add('correndo');

            setTimeout(() => {
                lailaImg.classList.add('caindo');
                estrelas.style.display = 'block';

                setTimeout(() => {
                    estrelas.style.display = 'none';
                    lailaImg.classList.remove('caindo');
                    lailaImg.classList.add('levantando');
                    
                    setTimeout(() => {
                        balao.style.display = 'block';

                        setTimeout(() => {
                            mudarParaCenaCaixa();
                        }, 5000);

                    }, 500);
                }, 3000);
            }, 1500);
        }

        function mudarParaCenaCaixa() {
            document.getElementById('texto-container').style.display = 'none';
            document.getElementById('jacare-container').style.display = 'none';
            
            const cenaCaixa = document.getElementById('cena-caixa');
            cenaCaixa.style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('balao-caixa').style.display = 'block';
            }, 500);
        }

        function abrirCaixa() {
            alert("A caixa abriu! Aqui você adicionará o restante das surpresas!");
        }
    </script>
</body>
</html>
