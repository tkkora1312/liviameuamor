<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia dos Namorados!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffcccc; /* Fundo vermelho claro */
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px; /* Para efeitos 3D na caixa */
        }

        /* Fundo Rico de Emojis Visíveis desde o Início */
        #background-coracoes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; 
            /* Importante: permite clicar nos elementos do fundo */
            pointer-events: auto; 
            overflow: hidden;
        }
        .element-wrapper {
            position: absolute; bottom: -80px;
            animation: floatUp linear infinite;
            /* Garante que o cursor mude ao passar pelos emojis clicáveis */
            cursor: pointer; 
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(360deg); }
        }

        /* Efeito de Tremida na Tela */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 8px); }
            20%, 40%, 60%, 80% { transform: translate(8px, -8px); }
        }
        .tremendo { animation: shake 0.4s ease-in-out; }

        /* Telinha de Início Inteligente */
        #tela-inicio {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: transparent; z-index: 100;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            pointer-events: none; /* Deixa cliques passarem para o fundo */
        }
        #box-comecar {
            pointer-events: auto; /* Permite interagir com o botão */
            text-align: center;
            z-index: 105;
        }
        #titulo-inicio {
            color: #c13b2b; font-size: 40px; margin-bottom: 30px; 
            text-shadow: 2px 2px 10px rgba(255,255,255,0.6);
        }
        #btn-comecar {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 40px; font-size: 22px; font-weight: 700; background-color: #c13b2b;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(193, 59, 43, 0.4); transition: transform 0.2s;
            max-width: 80%;
        }
        #btn-comecar:hover { transform: scale(1.05); }

        /* Textos da história */
        #texto-container {
            font-size: 38px; color: #7a1010; text-align: center;
            z-index: 10; position: absolute; top: 15%; width: 80%;
            line-height: 1.4; font-weight: 600; transition: opacity 0.5s;
        }
        .palavra-grande {
            font-size: 130px; color: #d32f2f; font-weight: 700; display: inline-block;
            opacity: 0; text-transform: uppercase; margin: 10px 15px;
            text-shadow: 4px 4px 0px #fff, 8px 8px 20px rgba(0,0,0,0.3);
            transform: translateY(-100vh);
        }
        .caindo-do-ceu { animation: dropDown 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
        @keyframes dropDown {
            0% { opacity: 1; transform: translateY(-100vh); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Container do Jacaré Laila */
        #jacare-container {
            position: absolute; left: -500px; 
            /* Mesma altura base que a caixa (50% - metade da altura da laila) */
            top: calc(50% - 90px); 
            display: none; flex-direction: row; align-items: center; z-index: 20;
            gap: 25px; transition: all 1s ease-in-out;
        }
        #laila-img { cursor: pointer; transition: transform 0.3s; }
        #laila-img:hover { transform: scale(1.05); }

        #laila-corpo { display: flex; flex-direction: column; align-items: center; }
        
        /* Estrelinhas girando (removido efeito de capotar, mas mantidas se atordoar) */
        #estrelas {
            display: none; font-size: 45px;
            animation: girar 1s linear infinite; margin-bottom: -15px; z-index: 27;
        }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Caixa de fala */
        .balao-fala {
            display: none; background: white; padding: 20px; border-radius: 20px;
            border: 3px solid #7a1010; max-width: 240px;
            text-align: center; font-weight: 600; color: #333; font-size: 18px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.15); position: relative;
        }
        .balao-fala::after {
            content: ''; position: absolute; 
            left: -11px; top: 50%; transform: translateY(-50%) rotate(45deg);
            width: 18px; height: 18px; background: white;
            border-left: 3px solid #7a1010; border-bottom: 3px solid #7a1010;
        }

        /* Cena Final: Caixa de Presente Perfeitamente Centralizada */
        #cena-caixa {
            position: absolute;
            /* Centralização Absoluta no meio da tela */
            left: 50%; top: 50%; 
            transform: translate(-50%, -50%);
            display: none; flex-direction: column; align-items: center; z-index: 30;
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* Caixa de Presente Verde e Imponente */
        .caixa-madeira {
            width: 220px; height: 220px; 
            background: linear-gradient(135deg, #27ae60, #1e8449); /* Verde vibrante */
            border: 6px solid #145a32; position: relative; cursor: pointer;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.2);
            border-radius: 15px;
            /* Agora flutua, e as fitas acompanham */
            animation: flutuarPresente 3s ease-in-out infinite, brilharCaixa 2s infinite alternate;
        }
        .caixa-madeira:hover { transform: scale(1.05) rotate(2deg); }
        
        /* Fitas Vermelhas do Presente */
        .caixa-madeira::before { 
            content: ""; position: absolute; left: 42%; top: 0; width: 16%; height: 100%; background: #e74c3c; /* Vermelho */
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .caixa-madeira::after { 
            content: ""; position: absolute; top: 42%; left: 0; height: 16%; width: 100%; background: #e74c3c; /* Vermelho */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Laço de Fita Superior (Acompanha a Flutuação) */
        .laco-presente {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 40px; background: #e74c3c; border-radius: 50% 50% 0 0;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); z-index: 35;
        }
        .laco-presente::before {
            content: ""; position: absolute; left: -25px; top: 5px; width: 40px; height: 30px;
            background: #e74c3c; border-radius: 50%; transform: rotate(-30deg);
        }
        .laco-presente::after {
            content: ""; position: absolute; right: -25px; top: 5px; width: 40px; height: 30px;
            background: #e74c3c; border-radius: 50%; transform: rotate(30deg);
        }

        /* Flutuação da Caixa INTEIRA (incluindo o laço) */
        @keyframes flutuarPresente {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes brilharCaixa {
            0% { box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 10px rgba(255, 234, 167, 0.2); }
            100% { box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 35px rgba(255, 234, 167, 0.7); }
        }

        /* Animações Físicas da Laila */
        .correndo { animation: correrLaila 1.5s forwards ease-out; }
        @keyframes correrLaila {
            0% { left: -500px; }
            100% { left: 25%; } /* Posição onde ela para livremente */
        }

    </style>
</head>
<body>

    <div id="background-coracoes"></div>

    <div id="tela-inicio">
        <div id="box-comecar">
            <h2 id="titulo-inicio">O que será que é isso...</h2>
            <button id="btn-comecar" onclick="lidarComCliqueBotao()">Descobrir!</button>
        </div>
    </div>

    <audio id="audio-boing" src="cartoon-boing.mp3" preload="auto"></audio>
    <audio id="audio-bongos" src="bongo-feet.mp3" preload="auto"></audio>

    <div id="texto-container">
        <span id="texto-parte1"></span><br>
        <span id="palavra-alvo" class="palavra-grande">grande</span><br>
        <span id="texto-parte2"></span>
    </div>

    <div id="jacare-container">
        <div id="laila-corpo">
            <div id="estrelas">💫✨💫</div>
            <img id="laila-img" src="laila.png" style="width: 180px; z-index: 25;" alt="Jacaré Laila" onclick="clicouNaLaila()">
            <div style="background: pink; color: #7a1010; padding: 4px 15px; border-radius: 15px; font-size: 16px; margin-top: -10px; font-weight: 700; z-index: 26; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">Laila</div>
        </div>
        <div id="balao-jacare" class="balao-fala">[SUA PRIMEIRA FRASE AQUI]<br><small style="font-size:12px; color: #c13b2b; font-weight:bold; display:block; margin-top:5px;">(Clique em mim para avançar!)</small></div>
    </div>

    <div id="cena-caixa">
        <div class="laco-presente"></div>
        <div class="caixa-madeira" onclick="abrirCaixa()"></div>
    </div>

    <script>
        // Sistema do botão de cliques exatos com pré-carregamento seguro do som
        let contadorCliques = 0;
        let historicoFrasesBotao = [
            "Descobrir de verdade!",
            "Descobrir mesmo!",
            "Aqui tem coisas que não podem ser desvistas...",
            "Tudo bem, você venceu! Mas o segredo não está em mim...",
            "É só clicar em qualquer emoji feliz do fundo para ver a mágica!"
        ];

        // Pré-carrega os áudios no primeiro clique do usuário para evitar bloqueios
        function preCarregarAudios() {
            const audios = ['audio-boing', 'audio-bongos'];
            audios.forEach(id => {
                const a = document.getElementById(id);
                a.play().then(() => {
                    a.pause();
                    a.currentTime = 0;
                }).catch(e => console.log("Áudio carregado via interação"));
            });
        }

        function lidarComCliqueBotao() {
            if (contadorCliques === 0) preCarregarAudios();
            
            contadorCliques++;
            const btn = document.getElementById('btn-comecar');
            
            if (contadorCliques <= historicoFrasesBotao.length) {
                btn.innerHTML = historicoFrasesBotao[contadorCliques - 1];
            } else {
                btn.innerHTML = "Sério, é só clicar nos emojis voadores do fundo!";
                btn.style.backgroundColor = "#7f8c8d";
            }
        }

        // Gerador de Fundo Ricos (Executado imediatamente na inicialização)
        const containerCoracoes = document.getElementById('background-coracoes');
        // Emojis voadores solicitados (apenas emojis felizes/temáticos)
        const outrosElementos = ['⭐', '💫', '🦭', '✨', '🍫', '💐', '❤️', '😊', '🥳'];

        for (let i = 0; i < 70; i++) {
            let wrapper = document.createElement('div');
            wrapper.className = 'element-wrapper';
            
            // Força um excelente preenchimento no lado esquerdo da tela
            let posicaoX = (i % 2 === 0) ? (Math.random() * 40) : (Math.random() * 100);
            wrapper.style.left = posicaoX + 'vw';
            
            let escala = 0.5 + Math.random() * 1.3;
            wrapper.style.transform = `scale(${escala})`;
            
            wrapper.style.animationDuration = (5 + Math.random() * 7) + 's';
            wrapper.style.animationDelay = (Math.random() * 6) + 's';
            
            // Escolhe um emoji aleatório e define o tamanho
            let itemAleatorio = outrosElementos[Math.floor(Math.random() * outrosElementos.length)];
            wrapper.innerText = itemAleatorio;
            wrapper.style.fontSize = "38px";

            // NOVO: Adiciona clique em QUALQUER elemento do fundo para iniciar o site!
            wrapper.onclick = function() {
                preCarregarAudios(); // Garante áudio se pular o botão
                comecarTudo();
            };
            
            containerCoracoes.appendChild(wrapper);
        }

        // Lógica das Cenas Principais
        const parte1 = "Feliz dia dos namorados e 6 meses atrasados meu ";
        const parte2 = "amor!";
        let lailaProntaParaClicar = false;
        
        function typeWriter(texto, elementoId, velocidade, callback) {
            let index = 0;
            const elemento = document.getElementById(elementoId);
            function digitar() {
                if (index < texto.length) {
                    elemento.innerHTML += texto.charAt(index);
                    index++;
                    setTimeout(digitar, velocidade);
                } else if (callback) {
                    callback();
                }
            }
            digitar();
        }

        // Inicia a sequência inteira (chamada ao clicar em emojis do fundo)
        function comecarTudo() {
            document.getElementById('tela-inicio').style.display = 'none';
            // Impede cliques extras no fundo após começar
            document.getElementById('background-coracoes').style.pointerEvents = 'none';
            
            typeWriter(parte1, 'texto-parte1', 40, () => {
                const palavraGrande = document.getElementById('palavra-alvo');
                
                // NOVO Gatilho Sonoro: Boing ao cair
                const audioBoing = document.getElementById('audio-boing');
                audioBoing.currentTime = 0;
                audioBoing.play();

                palavraGrande.classList.add('caindo-do-ceu');
                
                setTimeout(() => {
                    document.body.classList.add('tremendo');
                    
                    setTimeout(() => {
                        document.body.classList.remove('tremendo');
                        typeWriter(parte2, 'texto-parte2', 40, () => {
                            setTimeout(iniciarCenaJacare, 1000);
                        });
                    }, 400); 
                    
                }, 500); 
            });
        }

        function iniciarCenaJacare() {
            const jacare = document.getElementById('jacare-container');
            const audioBongos = document.getElementById('audio-bongos');
            const estrelas = document.getElementById('estrelas');
            const balao = document.getElementById('balao-jacare');

            // Gatilho: Toca os bongos por 2s antes de a Laila aparecer
            audioBongos.currentTime = 0;
            audioBongos.play();

            // Espera o bongo tocar (2 segundos) para exibir a Laila correndo
            setTimeout(() => {
                jacare.style.display = 'flex';
                jacare.classList.add('correndo'); // Agora ela só corre e para limpa

                // Laila aparece e o balão surge após a corrida (1.5s de corrida)
                setTimeout(() => {
                    balao.style.display = 'block';
                    lailaProntaParaClicar = true; 
                }, 1500);

            }, 2000); // tempo de bongo feet
        }

        // Função de clique na Laila para avançar
        function clicouNaLaila() {
            if (lailaProntaParaClicar) {
                mudarParaCenaCaixa();
            }
        }

        function mudarParaCenaCaixa() {
            // Some o cabeçalho de texto
            document.getElementById('texto-container').style.opacity = '0';
            setTimeout(() => { document.getElementById('texto-container').style.display = 'none'; }, 500);
            
            // Move a Laila isolada para o extremo esquerdo da tela (na mesma altura da caixa)
            const jacare = document.getElementById('jacare-container');
            jacare.style.left = '5vw';

            // Ajusta o balão de fala da Laila para a segunda etapa
            const balao = document.getElementById('balao-jacare');
            balao.style.display = 'none';
            
            setTimeout(() => {
                balao.innerHTML = "[SUA SEGUNDA FRASE AQUI]";
                balao.style.display = 'block';
                
                // Exibe a elegante caixa verde com fita vermelha perfeitamente centralizada
                const cenaCaixa = document.getElementById('cena-caixa');
                cenaCaixa.style.display = 'flex';
            }, 1000);
        }

        function abrirCaixa() {
            alert("A fita vermelha se desfez e a surpresa se abriu! O que você quer colocar aqui dentro agora?");
        }
    </script>
</body>
</html>
