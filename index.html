<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O que será que é isso...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffcccc; 
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Fundo Dinâmico de Emojis */
        #background-coracoes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: auto; overflow: hidden;
        }
        .element-wrapper {
            position: absolute; bottom: -80px;
            animation: floatUp linear infinite;
            cursor: pointer; 
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(360deg); }
        }

        /* Efeito de Tremida na Tela */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 8px); }
            20%, 40%, 60%, 80% { transform: translate(8px, -8px); }
        }
        .tremendo { animation: shake 0.4s ease-in-out; }

        /* Telinha de Início */
        #tela-inicio {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: transparent; z-index: 100;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            pointer-events: none;
        }
        #box-comecar {
            pointer-events: auto; text-align: center; z-index: 105;
        }
        #titulo-inicio {
            color: #c13b2b; font-size: 40px; margin-bottom: 30px; 
            text-shadow: 2px 2px 10px rgba(255,255,255,0.6);
        }
        #btn-comecar {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 40px; font-size: 22px; font-weight: 700; background-color: #c13b2b;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(193, 59, 43, 0.4); transition: transform 0.2s;
            max-width: 80%;
        }
        #btn-comecar:hover { transform: scale(1.05); }

        /* Textos Principais */
        #texto-container {
            font-size: 38px; color: #7a1010; text-align: center;
            z-index: 10; position: absolute; top: 15%; width: 80%;
            line-height: 1.4; font-weight: 600; transition: opacity 0.5s;
        }
        .palavra-grande {
            font-size: 130px; color: #d32f2f; font-weight: 700; display: inline-block;
            opacity: 0; text-transform: uppercase; margin: 10px 15px;
            text-shadow: 4px 4px 0px #fff, 8px 8px 20px rgba(0,0,0,0.3);
            transform: translateY(-100vh);
        }
        .caindo-do-ceu { animation: dropDown 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
        @keyframes dropDown {
            0% { opacity: 1; transform: translateY(-100vh); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Container do Jacaré Laila */
        #jacare-container {
            position: absolute; left: -500px; 
            top: calc(50% - 90px); /* Alinhado no meio junto com o presente */
            display: none; flex-direction: row; align-items: center; z-index: 20;
            gap: 25px; transition: all 1s ease-in-out;
        }
        #laila-img { cursor: pointer; transition: transform 0.3s; }
        #laila-img:hover { transform: scale(1.05); }
        #laila-corpo { position: relative; display: flex; flex-direction: column; align-items: center; }

        /* Balão de fala dinâmico */
        .balao-fala {
            display: none; background: white; padding: 20px; border-radius: 20px;
            border: 3px solid #7a1010; max-width: 240px;
            text-align: center; font-weight: 600; color: #333; font-size: 18px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.15);
        }
        /* Seta Lateral (Cena 1) */
        .seta-lateral::after {
            content: ''; position: absolute; 
            left: -11px; top: 50%; transform: translateY(-50%) rotate(45deg);
            width: 18px; height: 18px; background: white;
            border-left: 3px solid #7a1010; border-bottom: 3px solid #7a1010;
        }
        /* Seta para Baixo (Cena Final - Evita sobreposição) */
        .seta-baixo::after {
            content: ''; position: absolute; 
            bottom: -11px; left: 50%; transform: translateX(-50%) rotate(45deg);
            width: 18px; height: 18px; background: white;
            border-right: 3px solid #7a1010; border-bottom: 3px solid #7a1010;
        }

        /* Cena Final: Caixa de Presente e Laço flutuam JUNTOS */
        #cena-caixa {
            position: absolute;
            left: 50%; top: 50%; 
            transform: translate(-50%, -50%);
            display: none; flex-direction: column; align-items: center; z-index: 30;
            animation: flutuarPresente 3s ease-in-out infinite;
        }

        /* Caixa de Presente Vermelha Intensa */
        .caixa-madeira {
            width: 220px; height: 220px; 
            background: linear-gradient(135deg, #ff0000, #cc0000); /* Vermelho Vivo Puro */
            border: 6px solid #800000; position: relative; cursor: pointer;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.2);
            border-radius: 15px;
            animation: brilharCaixa 2s infinite alternate;
        }
        .caixa-madeira:hover { transform: scale(1.05) rotate(2deg); }
        
        /* Fitas do Presente (Vermelho Escuro Aveludado) */
        .caixa-madeira::before { 
            content: ""; position: absolute; left: 42%; top: 0; width: 16%; height: 100%; background: #990000; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .caixa-madeira::after { 
            content: ""; position: absolute; top: 42%; left: 0; height: 16%; width: 100%; background: #990000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Laço Superior (Mesma cor exata da fita) */
        .laco-presente {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 40px; background: #990000; border-radius: 50% 50% 0 0;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); z-index: 35;
        }
        .laco-presente::before {
            content: ""; position: absolute; left: -25px; top: 5px; width: 40px; height: 30px;
            background: #990000; border-radius: 50%; transform: rotate(-30deg);
        }
        .laco-presente::after {
            content: ""; position: absolute; right: -25px; top: 5px; width: 40px; height: 30px;
            background: #990000; border-radius: 50%; transform: rotate(30deg);
        }

        /* Flutuação Unificada */
        @keyframes flutuarPresente {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -57%); }
        }
        @keyframes brilharCaixa {
            0% { box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 10px rgba(255, 234, 167, 0.2); }
            100% { box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 35px rgba(255, 234, 167, 0.7); }
        }

        /* Animação de Corrida Limpa da Laila */
        .correndo { animation: correrLaila 1.5s forwards ease-out; }
        @keyframes correrLaila {
            0% { left: -500px; }
            100% { left: 25%; } 
        }

    </style>
</head>
<body>

    <div id="background-coracoes"></div>

    <div id="tela-inicio">
        <div id="box-comecar">
            <h2 id="titulo-inicio">O que será que é isso...</h2>
            <button id="btn-comecar" onclick="lidarComCliqueBotao()">Descobrir!</button>
        </div>
    </div>

    <audio id="audio-boing" src="cartoon-boing.mp3" preload="auto"></audio>
    <audio id="audio-bongos" src="bongo-feet.mp3" preload="auto"></audio>

    <div id="texto-container">
        <span id="texto-parte1"></span><br>
        <span id="palavra-alvo" class="palavra-grande">grande</span><br>
        <span id="texto-parte2"></span>
    </div>

    <div id="jacare-container">
        <div id="laila-corpo">
            <img id="laila-img" src="laila.png" style="width: 180px; z-index: 25;" alt="Jacaré Laila" onclick="clicouNaLaila()">
            <div style="background: pink; color: #7a1010; padding: 4px 15px; border-radius: 15px; font-size: 16px; margin-top: -10px; font-weight: 700; z-index: 26; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">Laila</div>
        </div>
        <div id="balao-jacare" class="balao-fala seta-lateral">[SUA PRIMEIRA FRASE AQUI]<br><small style="font-size:12px; color: #c13b2b; font-weight:bold; display:block; margin-top:5px;">(Clique em mim para avançar!)</small></div>
    </div>

    <div id="cena-caixa">
        <div class="laco-presente"></div>
        <div class="caixa-madeira" onclick="abrirCaixa()"></div>
    </div>

    <script>
        let contadorCliques = 0;
        let historicoFrasesBotao = [
            "Descobrir de verdade!",
            "Descobrir mesmo!",
            "Aqui tem coisas que não podem ser desvistas...",
            "Tudo bem, você venceu! Mas o segredo não está em mim...",
            "É só clicar em qualquer emoji feliz do fundo para ver a mágica!"
        ];

        // Estrutura do coração de pepperoni
        const svgPepperoni = `
        <svg viewBox="0 0 100 100" width="45" height="45" style="display:inline-block; vertical-align:middle;">
          <defs>
            <pattern id="pep-pat" patternUnits="userSpaceOnUse" width="25" height="25">
               <rect width="25" height="25" fill="#c13b2b"/>
               <circle cx="6" cy="6" r="3.5" fill="#8a251c"/>
               <circle cx="18" cy="15" r="2.5" fill="#8a251c"/>
            </pattern>
          </defs>
          <path d="M50,90 C50,90 10,60 10,30 A20,20 0 0,1 50,30 A20,20 0 0,1 90,30 C90,60 50,90 50,90 Z" fill="url(#pep-pat)"/>
        </svg>`;

        function preCarregarAudios() {
            ['audio-boing', 'audio-bongos'].forEach(id => {
                const a = document.getElementById(id);
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e => {});
            });
        }

        function lidarComCliqueBotao() {
            if (contadorCliques === 0) preCarregarAudios();
            contadorCliques++;
            const btn = document.getElementById('btn-comecar');
            if (contadorCliques <= historicoFrasesBotao.length) {
                btn.innerHTML = historicoFrasesBotao[contadorCliques - 1];
            } else {
                btn.innerHTML = "Sério, é só clicar nos emojis voadores do fundo!";
                btn.style.backgroundColor = "#7f8c8d";
            }
        }

        // Inicializa o fundo com a mistura rica de emojis pedidos
        const containerFundo = document.getElementById('background-coracoes');
        const emojisIniciais = ['⭐', '💫', '🦭', '✨', '🍫', '💐', '❤️', '😊', '🥳', '😎', '💖'];

        function gerarFundoInicial() {
            containerFundo.innerHTML = '';
            for (let i = 0; i < 70; i++) {
                let wrapper = document.createElement('div');
                wrapper.className = 'element-wrapper';
                wrapper.style.left = Math.random() * 100 + 'vw';
                wrapper.style.transform = `scale(${0.5 + Math.random() * 1.2})`;
                wrapper.style.animationDuration = (5 + Math.random() * 7) + 's';
                wrapper.style.animationDelay = (Math.random() * 5) + 's';
                
                wrapper.innerText = emojisIniciais[Math.floor(Math.random() * emojisIniciais.length)];
                wrapper.style.fontSize = "38px";

                wrapper.onclick = function() {
                    preCarregarAudios();
                    comecarTudo();
                };
                containerFundo.appendChild(wrapper);
            }
        }

        // Muda o fundo para conter APENAS os corações de pepperoni após sair da tela inicial
        function mudarFundoParaPepperoni() {
            containerFundo.innerHTML = '';
            containerFundo.style.pointerEvents = 'none'; // Desativa cliques no fundo durante o jogo
            for (let i = 0; i < 55; i++) {
                let wrapper = document.createElement('div');
                wrapper.className = 'element-wrapper';
                wrapper.style.left = Math.random() * 100 + 'vw';
                wrapper.style.transform = `scale(${0.4 + Math.random() * 1.1})`;
                wrapper.style.animationDuration = (6 + Math.random() * 8) + 's';
                wrapper.style.animationDelay = (Math.random() * 6) + 's';
                
                wrapper.innerHTML = svgPepperoni;
                containerFundo.appendChild(wrapper);
            }
        }

        // Lógica dos textos e cenas
        const parte1 = "Feliz dia dos namorados e 6 meses atrasados meu ";
        const parte2 = "amor!";
        let lailaProntaParaClicar = false;
        
        // Velocidade aumentada para 90ms (letras aparecem bem mais devagar)
        function typeWriter(texto, elementoId, velocidade = 90, callback) {
            let index = 0;
            const elemento = document.getElementById(elementoId);
            function digitar() {
                if (index < texto.length) {
                    elemento.innerHTML += texto.charAt(index);
                    index++;
                    setTimeout(digitar, velocidade);
                } else if (callback) {
                    callback();
                }
            }
            digitar();
        }

        function comecarTudo() {
            document.getElementById('tela-inicio').style.display = 'none';
            mudarFundoParaPepperoni(); // Troca instantaneamente para apenas pepperoni
            
            typeWriter(parte1, 'texto-parte1', 90, () => {
                const palavraGrande = document.getElementById('palavra-alvo');
                palavraGrande.classList.add('caindo-do-ceu');
                
                // Atraso de 180ms para o áudio tocar perfeitamente junto ao impacto visual
                setTimeout(() => {
                    const audioBoing = document.getElementById('audio-boing');
                    audioBoing.currentTime = 0;
                    audioBoing.play().catch(e => {});
                }, 180);
                
                setTimeout(() => {
                    document.body.classList.add('tremendo');
                    setTimeout(() => {
                        document.body.classList.remove('tremendo');
                        typeWriter(parte2, 'texto-parte2', 90, () => {
                            setTimeout(iniciarCenaJacare, 1000);
                        });
                    }, 400); 
                }, 500); 
            });
        }

        function iniciarCenaJacare() {
            const jacare = document.getElementById('jacare-container');
            const audioBongos = document.getElementById('audio-bongos');
            const balao = document.getElementById('balao-jacare');

            audioBongos.currentTime = 0;
            audioBongos.play().catch(e => {});

            // Laila espera o bongo (2 segundos) antes de começar a correr de forma limpa
            setTimeout(() => {
                jacare.style.display = 'flex';
                jacare.classList.add('correndo');

                setTimeout(() => {
                    balao.style.display = 'block';
                    lailaProntaParaClicar = true; 
                }, 1500);
            }, 2000);
        }

        function clicouNaLaila() {
            if (lailaProntaParaClicar) {
                mudarParaCenaCaixa();
            }
        }

        function mudarParaCenaCaixa() {
            document.getElementById('texto-container').style.opacity = '0';
            setTimeout(() => { document.getElementById('texto-container').style.display = 'none'; }, 500);
            
            const jacare = document.getElementById('jacare-container');
            const balao = document.getElementById('balao-jacare');
            
            // Laila recua totalmente para a esquerda e se fixa na altura central do presente
            jacare.style.left = '2vw';
            
            balao.style.display = 'none';
            
            setTimeout(() => {
                // Altera o balão para ficar no estilo superior (acima da cabeça da Laila)
                balao.classList.remove('seta-lateral');
                balao.classList.add('seta-baixo');
                balao.style.position = 'absolute';
                balao.style.bottom = '210px'; 
                balao.style.left = '50%';
                balao.style.transform = 'translateX(-50%)';
                
                balao.innerHTML = "[SUA SEGUNDA FRASE AQUI]";
                balao.style.display = 'block';
                
                // Faz a linda caixa vermelha surgir no centro absoluto
                document.getElementById('cena-caixa').style.display = 'flex';
            }, 1000);
        }

        function abrirCaixa() {
            alert("A fita se desfez e a grande surpresa se abriu!");
        }

        // Executa na abertura do site
        gerarFundoInicial();
    </script>
</body>
</html>
