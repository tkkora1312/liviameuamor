<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia dos Namorados!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffcccc; /* Fundo vermelho claro */
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Telinha de Início */
        #tela-inicio {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffcccc; z-index: 100;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        #btn-comecar {
            font-family: 'Fredoka', sans-serif;
            padding: 15px 40px; font-size: 24px; font-weight: 700; background-color: #c13b2b;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(193, 59, 43, 0.4); transition: transform 0.2s;
        }
        #btn-comecar:hover { transform: scale(1.1); }

        /* Pepperonis no Fundo */
        #background-coracoes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }
        .heart-wrapper {
            position: absolute; bottom: -80px;
            animation: floatUp linear infinite;
            opacity: 0.85;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(45deg); }
        }

        /* Efeito de Tremida na Tela */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 8px); }
            20%, 40%, 60%, 80% { transform: translate(8px, -8px); }
        }
        .tremendo { animation: shake 0.4s ease-in-out; }

        /* Textos */
        #texto-container {
            font-size: 38px;
            color: #7a1010;
            text-align: center;
            z-index: 10;
            position: absolute;
            top: 15%;
            width: 80%;
            line-height: 1.4;
            font-weight: 600;
            transition: opacity 0.5s ease;
        }
        .palavra-grande {
            font-size: 130px;
            color: #d32f2f;
            font-weight: 700;
            display: inline-block;
            opacity: 0;
            text-transform: uppercase;
            margin: 10px 15px;
            text-shadow: 4px 4px 0px #fff, 8px 8px 20px rgba(0,0,0,0.3);
            transform: translateY(-100vh);
        }
        .caindo-do-ceu {
            animation: dropDown 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }
        @keyframes dropDown {
            0% { opacity: 1; transform: translateY(-100vh); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Container do Jacaré Laila */
        #jacare-container {
            position: absolute; left: -500px; bottom: 15%;
            display: none; 
            flex-direction: row; 
            align-items: center; 
            z-index: 20;
            gap: 25px;
            transition: all 1s ease-in-out; /* Transiciona suavemente posição e estilos */
        }

        #laila-corpo {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer; /* Indica que é clicável */
        }
        
        /* Estrelinhas girando */
        #estrelas {
            display: none; font-size: 45px;
            animation: girar 1s linear infinite; margin-bottom: -15px;
            z-index: 27;
        }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Caixa de fala na Direita */
        .balao-fala {
            display: none; background: white; padding: 20px; border-radius: 20px;
            border: 3px solid #7a1010; max-width: 300px;
            text-align: center; font-weight: 600; color: #333; font-size: 20px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.15);
            position: relative;
        }
        /* Setinha do Balão padrão (Direita) */
        .balao-fala::after {
            content: ''; position: absolute; 
            left: -11px; top: 50%; transform: translateY(-50%) rotate(45deg);
            width: 18px; height: 18px;
            background: white;
            border-left: 3px solid #7a1010;
            border-bottom: 3px solid #7a1010;
        }

        /* --- Estilos da Cena 2 (Centralizada) --- */
        
        /* Classe aplicada via JS no jacare-container para reorganizar a Laila abaixo do presente */
        #jacare-container.cena-dois {
            left: 50% !important;
            bottom: 5% !important;
            transform: translateX(-50%);
            flex-direction: column-reverse !important; /* Coloca o balão ACIMA da Laila */
            gap: 10px;
        }
        /* Ajusta a setinha do balão para apontar para baixo na cena 2 */
        #jacare-container.cena-dois .balao-fala::after {
            left: 50%; bottom: -11px; top: auto;
            transform: translateX(-50%) rotate(45deg);
            border-left: none; border-bottom: 3px solid #7a1010;
            border-right: 3px solid #7a1010;
        }

        #cena-caixa {
            position: absolute;
            left: 50%; top: 40%;
            transform: translate(-50%, -50%) scale(0.5);
            display: none; 
            flex-direction: column; 
            align-items: center; 
            z-index: 30;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cena-caixa.mostrar {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2); /* Presente um pouco maior e centralizado */
        }

        /* Linda Caixa de Presente de Madeira Realista */
        .caixa-madeira {
            width: 240px; height: 240px; 
            background: linear-gradient(135deg, #a66f3c 0%, #73461d 100%); /* Degradê de madeira */
            border: 6px solid #4a2c11; 
            position: relative; cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 20px 40px rgba(0,0,0,0.4); 
            border-radius: 14px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .caixa-madeira:hover { transform: scale(1.06) rotate(2deg); }
        
        /* Fitas Rosas Volumosas */
        .caixa-madeira::before { 
            content: ""; position: absolute; left: 40%; top: 0; width: 20%; height: 100%; 
            background: linear-gradient(90deg, #ff4081 0%, #e91e63 100%); 
            box-shadow: 3px 0 8px rgba(0,0,0,0.3); border-radius: 2px;
        }
        .caixa-madeira::after { 
            content: ""; position: absolute; top: 40%; left: 0; height: 20%; width: 100%; 
            background: linear-gradient(180deg, #ff4081 0%, #e91e63 100%); 
            box-shadow: 0 3px 8px rgba(0,0,0,0.3); border-radius: 2px;
        }

        /* Laço em 3D no topo da caixa */
        .laco-presente {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 40px; z-index: 35; pointer-events: none;
        }
        .laco-esquerdo, .laco-direito {
            position: absolute; width: 45px; height: 35px;
            background: #ff4081; border: 3px solid #db145a; border-radius: 50% 50% 0 50%;
        }
        .laco-esquerdo { left: 3px; transform: rotate(-15deg); }
        .laco-direito { right: 3px; transform: rotate(105deg) scaleY(-1); }
        .laco-centro {
            position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
            width: 22px; height: 22px; background: #e91e63; border: 3px solid #db145a;
            border-radius: 50%; box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }

        /* Animações e Movimentos */
        .correndo { animation: correr 1.5s forwards, darPassos 0.15s infinite alternate; }
        @keyframes correr {
            0% { left: -500px; }
            100% { left: 30%; } 
        }
        /* Efeito visual extra caso o áudio falhe no navegador */
        @keyframes darPassos {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
        .caindo { animation: none; transform: rotate(-90deg); transition: transform 0.3s ease-in; }
        .levantando { transform: rotate(0deg); transition: transform 0.5s ease-out; }

    </style>
</head>
<body>

    <div id="tela-inicio">
        <h2 style="color: #c13b2b; font-size: 40px; margin-bottom: 30px;">Você tem um presente...</h2>
        <button id="btn-comecar" onclick="comecarTudo()">Abrir Presente</button>
    </div>

    <audio id="audio-correndo" src="passos.mp3" preload="auto"></audio>

    <div id="background-coracoes"></div>

    <div id="texto-container">
        <span id="texto-parte1"></span><br>
        <span id="palavra-alvo" class="palavra-grande">grande</span><br>
        <span id="texto-parte2"></span>
    </div>
